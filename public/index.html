<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Notas Clases</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* Glass card */
.glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Inputs */
.form-control {
    background: transparent;
    border: 1px solid #8a2be2;
    color: white;
}

.form-control:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 10px #00d4ff;
}

/* Botón */
.btn-neon {
    background: linear-gradient(45deg, #8a2be2, #00d4ff);
    border: none;
    color: white;
    font-weight: bold;
}

.btn-neon:hover {
    opacity: 0.9;
}

/* Notas */
.nota {
    background: rgba(0,0,0,0.4);
    border-left: 4px solid #8a2be2;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    transition: 0.3s;
}

.nota:hover {
    transform: scale(1.02);
}

/* Títulos */
h1, h2, h3 {
    color: #00d4ff;
}
</style>

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">🚀 App de Notas</h1>

    <!-- FORM -->
    <div class="glass mb-4">
        <h3>Agrega Nota</h3>

        <form action="/insertar" method="POST">
            <input type="text" name="nombre" class="form-control mb-2" placeholder="Ej:Español.." required>
            <textarea name="descripcion" class="form-control mb-2" placeholder="Escribe tu nota. ej(4.5)" required></textarea>
            <button class="btn btn-neon w-100">Guardar</button>
        </form>
    </div>

    <div class="glass">
        <h3>📋 Tus Notas</h3>
        <div id="listaNotas"></div>
    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalEditar">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">

      <div class="modal-header">
        <h5>Editar Nota</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="formEditar">
            <input type="hidden" id="editId">
            <input type="text" id="editNombre" class="form-control mb-2">
            <textarea id="editDescripcion" class="form-control mb-2"></textarea>
            <button class="btn btn-warning w-100">Actualizar</button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
function cargarNotas() {
    fetch('/notas')
    .then(res => res.json())
    .then(data => {
        const contenedor = document.getElementById('listaNotas');
        contenedor.innerHTML = '';

        data.forEach(nota => {
            contenedor.innerHTML += `
                <div class="nota">
                    <h5>${nota.nombre}</h5>
                    <p>${nota.descripcion}</p>
                    <button class="btn btn-warning btn-sm"
                        onclick="editarNota(${nota.id}, '${nota.nombre}', '${nota.descripcion}')">
                        Editar
                    </button>
                </div>
            `;
        });
    });
}

cargarNotas();

function editarNota(id, nombre, descripcion) {
    document.getElementById('editId').value = id;
    document.getElementById('editNombre').value = nombre;
    document.getElementById('editDescripcion').value = descripcion;

    new bootstrap.Modal(document.getElementById('modalEditar')).show();
}

document.getElementById('formEditar').addEventListener('submit', function(e) {
    e.preventDefault();

    const id = document.getElementById('editId').value;
    const nombre = document.getElementById('editNombre').value;
    const descripcion = document.getElementById('editDescripcion').value;

    fetch(`/notas/${id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ nombre, descripcion })
    })
    .then(() => {
        alert('Actualizado ✅');
        location.reload();
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
